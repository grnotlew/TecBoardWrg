<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecBoard</title>

    <link id="favicon" rel="icon" href="/images/Favicon-light.svg" type="image/x-icon">

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="./actions.js"></script>
</head>

<body onload="carregarPagina()">
    <header>
        <img id="logo" src="/images/Logo-dark.png" alt="Logo TecBoard">
        <button class="button-dark-mode" type="button" onclick="darkMode()"><img id="icon-dark-mode"
                src="/images/icon-dark.svg" alt="icone para trocar o tema claro e escuro"></button>
    </header>
    <main>
        <section>
            <div>
                <h1><span class="purple">Fique de olho</span> <br> no que importa</h1>
            </div>

            <div class="sub-title">
                <p>Monitoramento em tempo real com alertas inteligentes para sua aplicação nunca sair do ar sem
                    você saber.</p>
            </div>
            <hr>
            <div>
                <button class="btn-default">Testar versão demo</button>
            </div>
            <hr>
        </section>
        <section>
            <div>
                <img class="image-section" src="./images/mockup-1.png" alt="Mockup do TecBoard em um telefone celular">
            </div>
        </section>
    </main>
</body>

</html>
